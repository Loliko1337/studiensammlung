<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bode-Diagramme</title>
<style>
:root{
  --bg:#101418; --plot:#0d1216; --edge:#2b353f; --frame:#33414d;
  --grid1:#26333d; --grid2:#19232b; --zero:#3d4d5a;
  --ink:#dfe7ee; --dim:#8a99a7; --faint:#5d6d7b; --tick:#7b8a97;
  --btn:#171d23; --acc:#3fe0c8; --acc-ink:#0b1013; --mag:#3fe0c8; --pha:#ffb043;
}
body.light{
  --bg:#f2f4f6; --plot:#ffffff; --edge:#d3dade; --frame:#aeb9c1;
  --grid1:#d8e0e5; --grid2:#eef1f4; --zero:#9aa8b2;
  --ink:#1c2429; --dim:#4f5b64; --faint:#77848d; --tick:#69757e;
  --btn:#ffffff; --acc:#0d8f7c; --acc-ink:#ffffff; --mag:#0d8f7c; --pha:#c06a00;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
     font-family:"JetBrains Mono","SF Mono",ui-monospace,Consolas,monospace;font-size:13px}
header{display:flex;align-items:center;gap:16px;flex-wrap:wrap;
       padding:12px 20px;border-bottom:1px solid var(--edge)}
.seg{display:flex;border:1px solid var(--edge);border-radius:4px;overflow:hidden}
.seg button{background:var(--btn);border:0;color:var(--dim);padding:8px 18px;font:inherit;cursor:pointer}
.seg button+button{border-left:1px solid var(--edge)}
.seg button[aria-pressed="true"]{background:var(--acc);color:var(--acc-ink)}
.vals{color:var(--faint)}
#theme{margin-left:auto}
main{padding:14px 20px 40px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
figure{margin:0}
figcaption{color:var(--dim);padding-bottom:5px;font-size:12px}
canvas{display:block;width:100%;height:200px;background:var(--plot);
       border:1px solid var(--edge);border-radius:4px}
@media(max-width:720px){main{grid-template-columns:1fr}#theme{margin-left:0}}
</style>
</head>
<body>

<header>
  <div class="seg" id="seg">
    <button data-k="s" aria-pressed="true">Reihe</button>
    <button data-k="p" aria-pressed="false">Parallel</button>
  </div>
  <span class="vals">R = 100 Ω · L = 10 mH · C = 100 nF · |Z| und φ über f</span>
  <div class="seg" id="theme">
    <button data-t="dark">Dunkel</button>
    <button data-t="light">Hell</button>
  </div>
</header>

<main id="main"></main>

<script>
const R=100,L=0.01,C=1e-7,LG0=1,LG1=7;
const add=(a,b)=>[a[0]+b[0],a[1]+b[1]];
const inv=a=>{const d=a[0]*a[0]+a[1]*a[1];return[a[0]/d,-a[1]/d];};
const zEl=(t,w)=>t==='R'?[R,0]:t==='L'?[0,w*L]:[0,-1/(w*C)];
const Z=(p,k,w)=>k==='s'?p.reduce((s,t)=>add(s,zEl(t,w)),[0,0])
                        :inv(p.reduce((s,t)=>add(s,inv(zEl(t,w))),[0,0]));

const SETS={
 s:[[['R','C'],'R + C in Reihe'],[['R','L'],'R + L in Reihe'],[['R','L','C'],'R + L + C in Reihe']],
 p:[[['R','C'],'R ∥ C'],[['R','L'],'R ∥ L'],[['R','L','C'],'R ∥ L ∥ C']]
};

function curve(parts,kind){
  const F=[],M=[],P=[];
  for(let i=0;i<600;i++){
    const f=10**(LG0+(LG1-LG0)*i/599),z=Z(parts,kind,2*Math.PI*f);
    F.push(f);M.push(20*Math.log10(Math.hypot(z[0],z[1])));
    P.push(Math.atan2(z[1],z[0])*180/Math.PI);
  }
  return{F,M,P};
}
const si=v=>v>=1e6?v/1e6+' MHz':v>=1e3?v/1e3+' kHz':v+' Hz';

const CSS=n=>getComputedStyle(document.body).getPropertyValue(n).trim();
function plot(cv,F,V,mag){
  const col={grid1:CSS('--grid1'),grid2:CSS('--grid2'),zero:CSS('--zero'),
             frame:CSS('--frame'),tick:CSS('--tick'),trace:CSS(mag?'--mag':'--pha')};
  const r=cv.getBoundingClientRect(),d=devicePixelRatio||1;
  cv.width=r.width*d;cv.height=r.height*d;
  const g=cv.getContext('2d');g.setTransform(d,0,0,d,0,0);
  const W=r.width,H=r.height,pl=46,pr=10,pt=12,pb=22,pw=W-pl-pr,ph=H-pt-pb;
  let lo,hi,st;
  if(mag){lo=Math.floor(Math.min(...V)/20)*20;hi=Math.ceil(Math.max(...V)/20)*20;st=20;}
  else{lo=-90;hi=90;st=45;}
  const X=f=>pl+(Math.log10(f)-LG0)/(LG1-LG0)*pw;
  const Y=v=>pt+ph-(v-lo)/(hi-lo)*ph;
  g.font='10px monospace';g.textBaseline='middle';
  for(let e=LG0;e<=LG1;e++)for(let k=1;k<10;k++){
    const f=k*10**e;if(Math.log10(f)>LG1)break;
    const x=Math.round(X(f))+.5;
    g.strokeStyle=k===1?col.grid1:col.grid2;
    g.beginPath();g.moveTo(x,pt);g.lineTo(x,pt+ph);g.stroke();
  }
  g.textAlign='right';
  for(let v=lo;v<=hi+1e-9;v+=st){
    const y=Math.round(Y(v))+.5;
    g.strokeStyle=v===0?col.zero:col.grid2;
    g.beginPath();g.moveTo(pl,y);g.lineTo(pl+pw,y);g.stroke();
    g.fillStyle=col.tick;g.fillText(mag?v+' dB':v+'°',pl-6,Y(v));
  }
  g.strokeStyle=col.frame;g.strokeRect(pl+.5,pt+.5,pw-1,ph-1);
  g.textAlign='center';g.fillStyle=col.tick;
  for(let e=LG0;e<=LG1;e+=2)g.fillText(si(10**e),X(10**e),pt+ph+11);
  g.save();g.beginPath();g.rect(pl,pt,pw,ph);g.clip();
  g.strokeStyle=col.trace;g.lineWidth=2;g.lineJoin='round';g.beginPath();
  F.forEach((f,i)=>{const y=Y(V[i]);i?g.lineTo(X(f),y):g.moveTo(X(f),y);});
  g.stroke();g.restore();
}

let kind='s',drawn=[];
function render(){
  const main=document.getElementById('main');main.innerHTML='';drawn=[];
  SETS[kind].forEach(([parts,name])=>{
    const c=curve(parts,kind);
    [['Betrag |Z| in dBΩ',c.M,true],['Phase φ',c.P,false]].forEach(([cap,V,mag])=>{
      const fig=document.createElement('figure');
      fig.innerHTML=`<figcaption>${name} — ${cap}</figcaption><canvas></canvas>`;
      main.appendChild(fig);
      const cv=fig.querySelector('canvas');
      plot(cv,c.F,V,mag);
      drawn.push(()=>plot(cv,c.F,V,mag));
    });
  });
}
document.getElementById('seg').onclick=e=>{
  const b=e.target.closest('button');if(!b)return;
  kind=b.dataset.k;
  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b));
  render();
};
function setTheme(t){
  document.body.classList.toggle('light',t==='light');
  [...document.getElementById('theme').children]
    .forEach(b=>b.setAttribute('aria-pressed',b.dataset.t===t));
  drawn.forEach(f=>f());
}
document.getElementById('theme').onclick=e=>{
  const b=e.target.closest('button');if(b)setTheme(b.dataset.t);
};
addEventListener('resize',()=>drawn.forEach(f=>f()));
render();
setTheme(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');
</script>
</body>
</html>
