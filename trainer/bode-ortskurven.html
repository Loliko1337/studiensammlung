<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bode-Diagramme &amp; Ortskurven · RLC-Zweipole</title>
<style>
:root{
  --bg:#ffffff; --side:#f4f5f6; --edge:#dcdfe2; --plot:#ffffff;
  --grid1:#d6dade; --grid2:#eceef0; --frame:#9aa2a9;
  --ink:#22292e; --dim:#5c666e; --faint:#8b949b;
  --z:#1f6fb4; --y:#cc3333; --mk:#111417; --w0:#6b7f95;
}
body.dark{
  --bg:#101418; --side:#161c22; --edge:#2b353f; --plot:#0d1216;
  --grid1:#28343d; --grid2:#1a242c; --frame:#4a5762;
  --ink:#dfe7ee; --dim:#98a5b0; --faint:#6b7883;
  --z:#5aaef0; --y:#ff6b6b; --mk:#ffffff; --w0:#7d93a8;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
     font-family:"Inter","Helvetica Neue",Arial,sans-serif;font-size:13px}
.mono{font-family:"JetBrains Mono","SF Mono",ui-monospace,Consolas,monospace}
.wrap{display:grid;grid-template-columns:296px minmax(0,1fr);min-height:100vh}

aside{background:var(--side);border-right:1px solid var(--edge);padding:16px 16px 30px}
aside h2{margin:0 0 10px;font-size:10.5px;font-weight:600;letter-spacing:.13em;
         text-transform:uppercase;color:var(--faint)}
aside h2:not(:first-child){margin-top:24px}

.opt{display:flex;align-items:center;gap:10px;padding:4px 0;cursor:pointer;color:var(--ink)}
.opt input{appearance:none;width:11px;height:11px;border:1.4px solid var(--frame);
           border-radius:50%;margin:0;flex:none;cursor:pointer}
.opt input:checked{border-color:var(--z);background:
  radial-gradient(circle,var(--z) 0 45%,transparent 46%)}
.opt input:focus-visible{outline:2px solid var(--z);outline-offset:2px}
.opt span{font-size:12.5px}

.sl{margin:0 0 15px}
.sl .r{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.sl .n{color:var(--dim);font-size:12px}
.sl .v{font-size:12.5px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:18px;
                  background:transparent;cursor:ew-resize;margin:0}
input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:var(--edge)}
input[type=range]::-moz-range-track{height:5px;border-radius:3px;background:var(--edge)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
  margin-top:-4.5px;border-radius:50%;background:var(--plot);border:2px solid var(--z)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--plot);border:2px solid var(--z)}

.hint{color:var(--faint);font-size:11.5px;margin:-6px 0 12px;display:flex;gap:14px;flex-wrap:wrap}
button.rs{width:100%;background:var(--plot);border:1px solid var(--edge);color:var(--ink);
          border-radius:4px;padding:8px;font:inherit;cursor:pointer}
button.rs:hover{border-color:var(--frame)}
#ap{font-size:12.5px;line-height:1.75;white-space:pre;color:var(--ink)}
.mkrow{display:flex;gap:18px;margin-top:14px;padding-top:12px;border-top:1px solid var(--edge)}
.themerow{margin-top:18px;display:flex;gap:8px}
.themerow button{flex:1;background:var(--plot);border:1px solid var(--edge);color:var(--dim);
                 border-radius:4px;padding:6px;font:inherit;font-size:12px;cursor:pointer}
.themerow button[aria-pressed="true"]{border-color:var(--z);color:var(--ink)}

main{padding:12px 16px 30px;display:grid;grid-template-columns:1fr 1fr;
     grid-template-rows:auto auto;gap:10px 14px;align-content:start}
figure{margin:0}
figcaption{text-align:center;font-size:13px;color:var(--ink);padding:2px 0 4px}
figcaption em{font-style:normal;color:var(--faint);font-size:11.5px;margin-left:10px}
canvas{display:block;width:100%;height:330px}
@media(max-width:1080px){main{grid-template-columns:1fr}.wrap{grid-template-columns:1fr}
  aside{border-right:0;border-bottom:1px solid var(--edge)}}
</style>
</head>
<body>
<div class="wrap">

<aside>
  <h2>Schaltung</h2>
  <div id="circs"></div>

  <h2>Bauteilwerte</h2>
  <div id="sliders"></div>

  <h2>Markerfrequenz</h2>
  <div id="wsl"></div>
  <div class="hint mono"><span id="wrel"></span><span id="w0v"></span></div>
  <button class="rs" id="reset">Zurücksetzen</button>

  <h2>Arbeitspunkt</h2>
  <div id="ap" class="mono"></div>

  <div class="mkrow">
    <label class="opt"><input type="radio" name="mk" value="Z" checked><span>Marker auf Z</span></label>
    <label class="opt"><input type="radio" name="mk" value="Y"><span>Marker auf Y</span></label>
  </div>
  <div class="themerow" id="theme">
    <button data-t="light" aria-pressed="true">Hell</button>
    <button data-t="dark" aria-pressed="false">Dunkel</button>
  </div>
</aside>

<main>
  <figure><figcaption>Bodediagramm · Betrag</figcaption><canvas id="c1"></canvas></figure>
  <figure><figcaption>Ortskurve Z(jω)<em>Pfeil: wachsendes ω</em></figcaption><canvas id="c2"></canvas></figure>
  <figure><figcaption>Bodediagramm · Phase</figcaption><canvas id="c3"></canvas></figure>
  <figure><figcaption>Ortskurve Y(jω)<em>Pfeil: wachsendes ω</em></figcaption><canvas id="c4"></canvas></figure>
</main>
</div>

<script>
/* ---------- Modell ---------- */
const CIRCS=[
 {id:'p_rc' ,kind:'p',parts:['R','C']    ,label:'Parallel:  R ∥ C'},
 {id:'p_rl' ,kind:'p',parts:['R','L']    ,label:'Parallel:  R ∥ L'},
 {id:'p_rlc',kind:'p',parts:['R','L','C'],label:'Parallel:  R ∥ L ∥ C'},
 {id:'s_rc' ,kind:'s',parts:['R','C']    ,label:'Reihe:  R + C'},
 {id:'s_rl' ,kind:'s',parts:['R','L']    ,label:'Reihe:  R + L'},
 {id:'s_rlc',kind:'s',parts:['R','L','C'],label:'Reihe:  R + L + C'}
];
const DEF={R:1,L:1,C:1};
const S={c:CIRCS[5],R:1,L:1,C:1,w:1,mk:'Z'};

const add=(a,b)=>[a[0]+b[0],a[1]+b[1]];
const inv=a=>{const d=a[0]*a[0]+a[1]*a[1];return[a[0]/d,-a[1]/d];};
const zEl=(t,w)=>t==='R'?[S.R,0]:t==='L'?[0,w*S.L]:[0,-1/(w*S.C)];
function Zof(w){
  const p=S.c.parts;
  return S.c.kind==='s' ? p.reduce((s,t)=>add(s,zEl(t,w)),[0,0])
                        : inv(p.reduce((s,t)=>add(s,inv(zEl(t,w))),[0,0]));
}
function w0(){
  const p=S.c.parts;
  if(p.includes('L')&&p.includes('C'))return 1/Math.sqrt(S.L*S.C);
  if(p.includes('C'))return 1/(S.R*S.C);
  return S.R/S.L;
}
const abs=a=>Math.hypot(a[0],a[1]);
const arg=a=>Math.atan2(a[1],a[0])*180/Math.PI;

/* ---------- Format ---------- */
function sig(x,n){
  if(!isFinite(x))return '∞';
  if(x===0)return '0';
  const a=Math.abs(x);
  if(a>=1e5||a<1e-4)return x.toExponential(n-1).replace('e','·10^');
  let s=x.toPrecision(n);
  if(s.includes('.'))s=s.replace(/0+$/,'').replace(/\.$/,'');
  return s;
}
const SUP={'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
const sup=n=>String(n).split('').map(c=>SUP[c]).join('');

/* ---------- Datensatz ---------- */
let D=null;
function build(){
  const w0v=w0(),lo=Math.log10(w0v)-3,hi=Math.log10(w0v)+3,N=901;
  const W=[],Z=[],Y=[];
  for(let i=0;i<N;i++){
    const w=Math.pow(10,lo+(hi-lo)*i/(N-1)),z=Zof(w);
    W.push(w);Z.push(z);Y.push(inv(z));
  }
  D={w0:w0v,lo,hi,W,Z,Y};
}

/* ---------- Zeichenhilfen ---------- */
const CSS=n=>getComputedStyle(document.body).getPropertyValue(n).trim();
function setup(cv){
  const r=cv.getBoundingClientRect(),d=devicePixelRatio||1;
  cv.width=Math.max(1,r.width*d);cv.height=Math.max(1,r.height*d);
  const g=cv.getContext('2d');g.setTransform(d,0,0,d,0,0);
  g.clearRect(0,0,r.width,r.height);
  return{g,W:r.width,H:r.height};
}
function niceStep(span,target){
  const raw=span/target,e=Math.pow(10,Math.floor(Math.log10(raw))),m=raw/e;
  return (m<1.5?1:m<3?2:m<7?5:10)*e;
}

/* ---------- Bode ---------- */
function bode(cv,type){
  const{g,W,H}=setup(cv);
  const pl=62,pr=12,pt=10,pb=34,pw=W-pl-pr,ph=H-pt-pb;
  const mag=type==='mag';
  const vz=D.Z.map(z=>mag?20*Math.log10(abs(z)):arg(z));
  const vy=D.Y.map(y=>mag?20*Math.log10(abs(y)):arg(y));
  let lo,hi,st;
  if(mag){
    const m=Math.max(...vz.map(Math.abs),...vy.map(Math.abs));
    hi=Math.ceil(m/20)*20;lo=-hi;st=hi>80?40:20;
  }else{lo=-90;hi=90;st=45;}
  const X=w=>pl+(Math.log10(w)-D.lo)/(D.hi-D.lo)*pw;
  const Y=v=>pt+ph-(v-lo)/(hi-lo)*ph;

  g.fillStyle=CSS('--plot');g.fillRect(pl,pt,pw,ph);
  g.font='11px "JetBrains Mono",ui-monospace,monospace';g.textBaseline='middle';
  for(let e=Math.ceil(D.lo);e<=Math.floor(D.hi);e++)for(let k=1;k<10;k++){
    const w=k*Math.pow(10,e);if(Math.log10(w)>D.hi)break;
    const x=Math.round(X(w))+.5;
    g.strokeStyle=k===1?CSS('--grid1'):CSS('--grid2');g.lineWidth=1;
    g.beginPath();g.moveTo(x,pt);g.lineTo(x,pt+ph);g.stroke();
  }
  g.textAlign='right';
  for(let v=lo;v<=hi+1e-9;v+=st){
    const y=Math.round(Y(v))+.5;
    g.strokeStyle=CSS('--grid1');g.beginPath();g.moveTo(pl,y);g.lineTo(pl+pw,y);g.stroke();
    g.fillStyle=CSS('--dim');g.fillText(v.toFixed(0),pl-8,Y(v));
  }
  g.strokeStyle=CSS('--frame');g.lineWidth=1;g.strokeRect(pl+.5,pt+.5,pw-1,ph-1);

  // ω0
  g.save();g.setLineDash([2,3]);g.strokeStyle=CSS('--w0');
  g.beginPath();g.moveTo(X(D.w0)+.5,pt);g.lineTo(X(D.w0)+.5,pt+ph);g.stroke();g.restore();

  const line=(v,col,dash)=>{
    g.save();g.beginPath();g.rect(pl,pt,pw,ph);g.clip();
    if(dash)g.setLineDash([7,4]);
    g.strokeStyle=col;g.lineWidth=1.9;g.lineJoin='round';g.beginPath();
    D.W.forEach((w,i)=>{const y=Y(v[i]);i?g.lineTo(X(w),y):g.moveTo(X(w),y);});
    g.stroke();g.restore();
  };
  line(vz,CSS('--z'),false);
  line(vy,CSS('--y'),true);

  // Marker
  const z=Zof(S.w),y=inv(z);
  const mzv=mag?20*Math.log10(abs(z)):arg(z), myv=mag?20*Math.log10(abs(y)):arg(y);
  const dot=(x,yy,fill)=>{
    g.beginPath();g.arc(x,yy,4.6,0,7);
    if(fill){g.fillStyle=CSS('--mk');g.fill();}
    else{g.fillStyle=CSS('--plot');g.fill();g.strokeStyle=CSS('--mk');g.lineWidth=1.6;g.stroke();}
  };
  g.save();g.beginPath();g.rect(pl-6,pt-6,pw+12,ph+12);g.clip();
  dot(X(S.w),Y(mzv),S.mk==='Z');dot(X(S.w),Y(myv),S.mk==='Y');g.restore();

  // Achsen
  g.textAlign='center';g.fillStyle=CSS('--dim');
  for(let e=Math.ceil(D.lo);e<=Math.floor(D.hi);e++)
    g.fillText('10'+sup(e),X(Math.pow(10,e)),pt+ph+14);
  g.fillStyle=CSS('--faint');
  g.fillText('Kreisfrequenz ω in rad/s',pl+pw/2,pt+ph+29);
  g.save();g.translate(15,pt+ph/2);g.rotate(-Math.PI/2);g.textAlign='center';
  g.fillStyle=CSS('--faint');
  g.fillText(mag?'20·lg|Z/Ω| bzw. 20·lg|Y/S| in dB':'Phase in Grad',0,0);g.restore();

  // Legende
  const items=mag?[['|Z|',CSS('--z'),0],['|Y|',CSS('--y'),1]]:[['arg Z',CSS('--z'),0],['arg Y',CSS('--y'),1]];
  items.push(['ω₀',CSS('--w0'),2]);
  const bw=76,bh=18*items.length+8,bx=pl+pw-bw-8,by=pt+8;
  g.fillStyle=CSS('--plot');g.globalAlpha=.92;g.fillRect(bx,by,bw,bh);g.globalAlpha=1;
  g.strokeStyle=CSS('--grid1');g.strokeRect(bx+.5,by+.5,bw,bh);
  g.textAlign='left';
  items.forEach(([t,c,style],i)=>{
    const yy=by+14+18*i;
    g.save();g.strokeStyle=c;g.lineWidth=style===2?1:1.9;
    if(style===1)g.setLineDash([6,3]);if(style===2)g.setLineDash([2,3]);
    g.beginPath();g.moveTo(bx+7,yy);g.lineTo(bx+29,yy);g.stroke();g.restore();
    g.fillStyle=CSS('--ink');g.fillText(t,bx+35,yy);
  });
}

/* ---------- Ortskurve ---------- */
function locus(cv,which){
  const{g,W,H}=setup(cv);
  const pl=58,pr=14,pt=10,pb=34,pw=W-pl-pr,ph=H-pt-pb;
  const pts=which==='Z'?D.Z:D.Y;
  const col=which==='Z'?CSS('--z'):CSS('--y');
  const Dm=which==='Z'?S.R:1/S.R;
  const circle=which==='Z'?(S.c.kind==='p'):(S.c.kind==='s');
  const half=(circle?0.78:1.5)*Dm;
  const s=Math.min(pw,ph)/(2*half);
  const cx0=Dm/2, cy0=0;
  const X=re=>pl+pw/2+(re-cx0)*s;
  const Y=im=>pt+ph/2-(im-cy0)*s;
  const reMin=cx0-pw/(2*s), reMax=cx0+pw/(2*s);
  const imMin=cy0-ph/(2*s), imMax=cy0+ph/(2*s);

  g.fillStyle=CSS('--plot');g.fillRect(pl,pt,pw,ph);
  g.font='11px "JetBrains Mono",ui-monospace,monospace';g.textBaseline='middle';
  const stp=niceStep(2*half,5);
  g.textAlign='center';
  for(let v=Math.ceil(reMin/stp)*stp;v<=reMax;v+=stp){
    const x=Math.round(X(v))+.5;
    g.strokeStyle=Math.abs(v)<stp*1e-6?CSS('--grid1'):CSS('--grid2');
    g.beginPath();g.moveTo(x,pt);g.lineTo(x,pt+ph);g.stroke();
    g.fillStyle=CSS('--dim');g.fillText(sig(v,3),X(v),pt+ph+14);
  }
  g.textAlign='right';
  for(let v=Math.ceil(imMin/stp)*stp;v<=imMax;v+=stp){
    const y=Math.round(Y(v))+.5;
    g.strokeStyle=Math.abs(v)<stp*1e-6?CSS('--grid1'):CSS('--grid2');
    g.beginPath();g.moveTo(pl,y);g.lineTo(pl+pw,y);g.stroke();
    g.fillStyle=CSS('--dim');g.fillText(sig(v,3),pl-8,Y(v));
  }
  g.strokeStyle=CSS('--frame');g.lineWidth=1;g.strokeRect(pl+.5,pt+.5,pw-1,ph-1);

  // Kurve (Segmente außerhalb des Fensters abschneiden)
  const lim=12*half;
  const insideBig=p=>Math.abs(p[0]-cx0)<lim&&Math.abs(p[1]-cy0)<lim;
  g.save();g.beginPath();g.rect(pl,pt,pw,ph);g.clip();
  g.strokeStyle=col;g.lineWidth=2;g.lineJoin='round';
  let open=false;g.beginPath();
  pts.forEach(p=>{
    if(!insideBig(p)){open=false;return;}
    const x=X(p[0]),y=Y(p[1]);
    if(open)g.lineTo(x,y);else{g.moveTo(x,y);open=true;}
  });
  g.stroke();

  // Richtungspfeile
  const vis=[];pts.forEach((p,i)=>{
    if(p[0]>reMin&&p[0]<reMax&&p[1]>imMin&&p[1]<imMax)vis.push(i);
  });
  [0.42,0.78].forEach(f=>{
    if(vis.length<12)return;
    const i=vis[Math.floor(f*(vis.length-1))];
    const a=pts[Math.max(i-3,vis[0])],b=pts[Math.min(i+3,vis[vis.length-1])];
    const ax=X(a[0]),ay=Y(a[1]),bx=X(b[0]),by=Y(b[1]);
    const ang=Math.atan2(by-ay,bx-ax);
    const mx=X(pts[i][0]),my=Y(pts[i][1]);
    g.save();g.translate(mx,my);g.rotate(ang);g.fillStyle=col;
    g.beginPath();g.moveTo(8,0);g.lineTo(-5,5);g.lineTo(-5,-5);g.closePath();g.fill();g.restore();
  });

  // Marker
  const z=Zof(S.w),p=which==='Z'?z:inv(z);
  const fill=(S.mk===which);
  g.beginPath();g.arc(X(p[0]),Y(p[1]),4.6,0,7);
  if(fill){g.fillStyle=CSS('--mk');g.fill();}
  else{g.fillStyle=CSS('--plot');g.fill();g.strokeStyle=CSS('--mk');g.lineWidth=1.6;g.stroke();}
  g.restore();

  g.textAlign='center';g.fillStyle=CSS('--faint');
  g.fillText(which==='Z'?'Re{Z} in Ω':'Re{Y} in S',pl+pw/2,pt+ph+29);
  g.save();g.translate(14,pt+ph/2);g.rotate(-Math.PI/2);g.textAlign='center';
  g.fillStyle=CSS('--faint');
  g.fillText(which==='Z'?'Im{Z} in Ω':'Im{Y} in S',0,0);g.restore();
}

/* ---------- UI ---------- */
function mkSlider(host,key,name,lo,hi,unit,onchg){
  const t=Math.round(1000*Math.log(S[key]/lo)/Math.log(hi/lo));
  const d=document.createElement('div');d.className='sl';
  d.innerHTML=`<div class="r"><span class="n">${name}</span>
    <span class="v mono" id="lbl_${key}">${sig(S[key],4)} ${unit}</span></div>
    <input type="range" min="0" max="1000" value="${t}" aria-label="${name}">`;
  d.querySelector('input').addEventListener('input',e=>{
    S[key]=lo*Math.pow(hi/lo,e.target.value/1000);
    d.querySelector('#lbl_'+key).textContent=sig(S[key],4)+' '+unit;
    onchg();
  });
  host.appendChild(d);
}
function buildSliders(){
  const host=document.getElementById('sliders');host.innerHTML='';
  const p=S.c.parts;
  mkSlider(host,'R','R',0.01,100,'Ω',()=>full());
  if(p.includes('L'))mkSlider(host,'L','L',0.01,100,'H',()=>full());
  if(p.includes('C'))mkSlider(host,'C','C',0.01,100,'F',()=>full());
}
function buildW(){
  const host=document.getElementById('wsl');host.innerHTML='';
  const lo=Math.pow(10,D.lo),hi=Math.pow(10,D.hi);
  S.w=Math.min(Math.max(S.w,lo),hi);
  const t=Math.round(1000*Math.log(S.w/lo)/Math.log(hi/lo));
  host.innerHTML=`<div class="sl"><div class="r"><span class="n">ω</span>
    <span class="v mono" id="lbl_w">${sig(S.w,4)} rad/s</span></div>
    <input type="range" min="0" max="1000" value="${t}" aria-label="Markerfrequenz"></div>`;
  host.querySelector('input').addEventListener('input',e=>{
    S.w=lo*Math.pow(hi/lo,e.target.value/1000);
    document.getElementById('lbl_w').textContent=sig(S.w,4)+' rad/s';
    readout();redraw();
  });
}
function readout(){
  document.getElementById('wrel').textContent='ω/ω₀ = '+sig(S.w/D.w0,4);
  document.getElementById('w0v').textContent='ω₀ = '+sig(D.w0,4)+' rad/s';
  const z=Zof(S.w),y=inv(z);
  const cpx=(v,u)=>`${sig(v[0],4)} ${v[1]<0?'−':'+'} j${sig(Math.abs(v[1]),4)} ${u}`;
  const pol=(v,u)=>`${sig(abs(v),4)} ${u} ∠ ${arg(v)>=0?'+':'−'}${sig(Math.abs(arg(v)),4)}°`;
  document.getElementById('ap').textContent=
    `Z = ${cpx(z,'Ω')}\n    ${pol(z,'Ω')}\nY = ${cpx(y,'S')}\n    ${pol(y,'S')}`;
}
function redraw(){
  bode(document.getElementById('c1'),'mag');
  bode(document.getElementById('c3'),'ph');
  locus(document.getElementById('c2'),'Z');
  locus(document.getElementById('c4'),'Y');
}
function full(){build();buildW();readout();redraw();}

const circs=document.getElementById('circs');
CIRCS.forEach(c=>{
  const l=document.createElement('label');l.className='opt';
  l.innerHTML=`<input type="radio" name="circ" value="${c.id}" ${c===S.c?'checked':''}>
               <span class="mono">${c.label}</span>`;
  l.querySelector('input').onchange=()=>{S.c=c;buildSliders();full();};
  circs.appendChild(l);
});
document.querySelectorAll('input[name=mk]').forEach(r=>{
  r.onchange=()=>{S.mk=r.value;redraw();};
});
document.getElementById('reset').onclick=()=>{
  Object.assign(S,{R:DEF.R,L:DEF.L,C:DEF.C});
  buildSliders();build();S.w=D.w0;buildW();readout();redraw();
};
document.getElementById('theme').onclick=e=>{
  const b=e.target.closest('button');if(!b)return;
  document.body.classList.toggle('dark',b.dataset.t==='dark');
  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed',x===b));
  redraw();
};
