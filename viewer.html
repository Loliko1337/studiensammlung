<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Übersicht</title>
<link rel="stylesheet" href="stil.css?v=9">
<script src="config.js?v=9"></script>
<script src="sammlung.js?v=9" defer></script>
</head>
<body>
<script>
/* Sichtbare Fehleranzeige statt stummem Abbruch (z. B. bei Cache-/Versionsproblemen) */
window.addEventListener("error", function(e){
  var b = document.getElementById("jsFehlerBanner");
  if (!b){
    b = document.createElement("div");
    b.id = "jsFehlerBanner";
    b.className = "kein-druck";
    b.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;z-index:999;background:#fbeae9;border:1px solid #eccfcd;color:#d6453d;border-radius:8px;padding:10px 14px;font:12.5px ui-monospace,Menlo,monospace;box-shadow:0 8px 24px rgba(20,30,40,.2)";
    document.body.appendChild(b);
  }
  b.innerHTML = "⚠ Skriptfehler: " + (e.message || "unbekannt") +
    "<br>Meist hilft: Seite mit <b>Strg+F5</b> neu laden (alte Version im Cache) und prüfen, ob alle Dateien (v.&nbsp;a. sammlung.js) aktuell hochgeladen sind.";
});
</script>
<div class="wrap">

  <header class="top kein-druck">
    <div class="brand">
      <p class="eyebrow">Übersicht</p>
      <h1 id="kopfTitel">Wird geladen …</h1>
      <div class="sub" id="kopfSub"></div>
    </div>
    <div class="kopf-aktionen">
      <a class="btn" href="index.html">← Portal</a>
      <a class="btn nur-admin" id="btnBearbeiten" hidden>Bearbeiten</a>
      <button class="btn primaer" id="btnPdf">Als PDF speichern</button>
    </div>
  </header>

  <div id="ziel"></div>

  <div class="leer kein-druck" id="nichtGefunden" hidden>
    Diese Übersicht wurde nicht gefunden. Vielleicht wurde sie umbenannt oder noch nicht veröffentlicht —
    zurück zum <a href="index.html">Portal</a>.
  </div>

  <p class="kein-druck" style="text-align:center;color:var(--ink-soft);font-size:12px;font-family:var(--mono);margin-top:18px">
    Tipp: „Als PDF speichern" öffnet den Druckdialog — dort als Ziel „Als PDF speichern" wählen.
  </p>

</div>

<script defer>
document.addEventListener("DOMContentLoaded", () => {
  const S = window.Sammlung;
  const id = new URLSearchParams(location.search).get("doc");
  let gerendert = false;

  function zeigen(doc){
    gerendert = true;
    document.title = doc.titel + " · Übersicht";
    document.getElementById("kopfTitel").textContent = doc.titel;
    document.getElementById("kopfSub").textContent = doc.untertitel || "";
    S.renderDoc(doc, document.getElementById("ziel"));
    if (S.eingeloggt()){
      const b = document.getElementById("btnBearbeiten");
      b.hidden = false;
      b.href = "editor.html?doc=" + encodeURIComponent(doc.id);
    }
  }
  function nichtGefunden(){
    document.getElementById("kopfTitel").textContent = "Nicht gefunden";
    document.getElementById("nichtGefunden").hidden = false;
    document.getElementById("btnPdf").hidden = true;
  }

  if (!id){ nichtGefunden(); return; }

  // Lokaler Entwurf (z. B. Editor-Vorschau) ist immer der frischeste Stand dieses Geräts → sofort zeigen
  const entwurf = S.lokaleDocs()[id];
  if (entwurf) zeigen(entwurf);

  // Veröffentlichte Fassung: sofort aus Schnappschuss/Datei, frisch aus der API — nur bei Änderung neu zeichnen
  if (!entwurf) S.lebendLaden(`docs-data/${id}.json`, zeigen);

  // Nach 3 s weder Entwurf noch Daten → sauber melden statt ewig "Wird geladen …"
  setTimeout(() => { if (!gerendert) nichtGefunden(); }, 3000);

  document.getElementById("btnPdf").addEventListener("click", () => window.print());
});
</script>
</body>
</html>
